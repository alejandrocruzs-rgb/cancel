<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despegar AfterSales - Cancellation Flow</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f9fa;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    margin: 0;
  }
  h1 { font-size: 20px; color: #2E4057; margin-bottom: 4px; }
  p.sub { font-size: 13px; color: #888; margin-top: 0; margin-bottom: 20px; }
  .container {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 30px;
    max-width: 750px;
    width: 100%;
  }
  svg a:hover rect {
    filter: brightness(0.92);
    transition: filter 0.2s;
  }
  svg a { cursor: pointer; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #e8e8e8;
    font-size: 12px;
    color: #666;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<h1>Despegar AfterSales API - Cancellation Flow</h1>
<p class="sub">Base URL: https://api-dev.despegar.com/v3/reservations — <a href="https://api-docs.despegar.com/docs/aftersales" target="_blank" style="color:#185FA5">Full docs</a></p>
<div class="container">
<svg width="100%" viewBox="0 0 680 850">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- STEP 1: Allowance -->
<a href="https://api-docs.despegar.com/reference/getcancelallowance" target="_blank" style="cursor:pointer">
<g>
  <rect x="220" y="30" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="48" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Step 1: Allowance</text>
  <text x="340" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">GET /{productId}/cancels/allowance</text>
</g>
</a>

<!-- Decision -->
<g>
  <rect x="230" y="116" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="138" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Is cancellation allowed?</text>
</g>
<line x1="340" y1="86" x2="340" y2="116" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LEFT: Disallowed -->
<g>
  <rect x="40" y="200" width="160" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="120" y="218" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#791F1F">Disallowed</text>
  <text x="120" y="238" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#A32D2D">Cannot cancel</text>
</g>
<text x="175" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">disallowance</text>
<path d="M230 138 L120 138 L120 200" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- RIGHT: Allowed -->
<text x="505" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">allowed / unknown</text>
<path d="M450 138 L505 138 L505 200" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- STEP 2: Quote -->
<a href="https://api-docs.despegar.com/reference/createcancelquote" target="_blank" style="cursor:pointer">
<g>
  <rect x="385" y="200" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="505" y="218" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Step 2: Quote</text>
  <text x="505" y="238" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">POST /cancels/quote</text>
</g>
</a>

<!-- Decision: resolution -->
<g>
  <rect x="405" y="290" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="505" y="312" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Resolution type?</text>
</g>
<line x1="505" y1="256" x2="505" y2="290" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LEFT: Automatic -->
<text x="300" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">automatic</text>
<path d="M405 312 L260 312 L260 380" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- RIGHT: Manual -->
<text x="570" y="370" text-anchor="end" font-family="sans-serif" font-size="12" fill="#888">manual</text>
<line x1="505" y1="334" x2="505" y2="380" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- STEP 3A: Cancel (Automatic) -->
<a href="https://api-docs.despegar.com/reference/cancelreservation" target="_blank" style="cursor:pointer">
<g>
  <rect x="140" y="380" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="260" y="398" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Step 3: Cancel</text>
  <text x="260" y="418" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">POST /{id}/cancels</text>
</g>
</a>

<!-- Result: Canceled -->
<g>
  <rect x="180" y="470" width="160" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="260" y="492" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A">Canceled (CAN-XXX)</text>
</g>
<line x1="260" y1="436" x2="260" y2="470" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Note -->
<text x="140" y="540" font-family="sans-serif" font-size="12" fill="#A32D2D">⚠ Irreversible once confirmed</text>

<!-- Disallowed note -->
<text x="40" y="310" font-family="sans-serif" font-size="12" fill="#888">Product already used,</text>
<text x="40" y="326" font-family="sans-serif" font-size="12" fill="#888">dates passed, etc.</text>

<!-- STEP 3B: Cancel (Manual) -->
<a href="https://api-docs.despegar.com/reference/cancelreservation" target="_blank" style="cursor:pointer">
<g>
  <rect x="385" y="380" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="505" y="398" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Step 3: Cancel</text>
  <text x="505" y="418" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">POST /{id}/cancels → CAN-XXX</text>
</g>
</a>

<!-- Wait for agent -->
<g>
  <rect x="405" y="470" width="200" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="505" y="492" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">Wait for agent quote</text>
</g>
<line x1="505" y1="436" x2="505" y2="470" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Webhook -->
<g>
  <rect x="395" y="548" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="505" y="570" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Webhook: quoting finished</text>
</g>
<line x1="505" y1="514" x2="505" y2="548" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Note -->
<text x="140" y="540" font-family="sans-serif" font-size="12" fill="#A32D2D">⚠ If the cancel quote is not confirmed, it will expire according to the Quote response</text>

<!-- STEP 4: FlowInfo -->
<a href="https://api-docs.despegar.com/reference/getflowinfo" target="_blank" style="cursor:pointer">
<g>
  <rect x="385" y="626" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="505" y="644" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">Step 4: FlowInfo</text>
  <text x="505" y="664" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">GET /{productId}/cancels/{flowId}/quote</text>
</g>
</a>
<line x1="505" y1="592" x2="505" y2="626" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- STEP 5: Cancel Response -->
<a href="https://api-docs.despegar.com/reference/updatecancelquote" target="_blank" style="cursor:pointer">
<g>
  <rect x="385" y="716" width="240" height="56" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="505" y="734" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#72243E">Step 5: Cancel Response</text>
  <text x="505" y="754" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993556">PATCH /{productId}/cancels/{flowId}/quote</text>
</g>
</a>
<line x1="505" y1="682" x2="505" y2="716" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Final outcome -->
<text x="505" y="800" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">Accept → Canceled / Reject → Not canceled</text>

</svg>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#E6F1FB;border:1px solid #185FA5"></div> Allowance (GET)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#E1F5EE;border:1px solid #0F6E56"></div> Quote (POST)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#EEEDFE;border:1px solid #534AB7"></div> Cancel (POST)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FAECE7;border:1px solid #993C1D"></div> FlowInfo (GET)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FBEAF0;border:1px solid #993556"></div> Cancel Response (PATCH)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FAEEDA;border:1px solid #854F0B"></div> Async wait</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F1EFE8;border:1px solid #5F5E5A"></div> Decision / Event</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FCEBEB;border:1px solid #A32D2D"></div> Blocked</div>
  <div class="legend-item"><div class="legend-dot" style="background:#EAF3DE;border:1px solid #3B6D11"></div> Success</div>
</div>

</div>
</body>
</html>
